<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tile Department Floor Plan</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --bg: #161614;
  --surface: #1e1e1b;
  --surface2: #252522;
  --border: #323230;
  --border-light: #404040;
  --text: #ddd9d0;
  --text-muted: #a8a49c;
  --text-dim: #6e6e68;
  --accent: #d4b47a;
  --accent-dim: #8a7248;
  --input-bg: #1a1a18;
  --input-border: #3a3a37;
  --input-focus: #d4b47a;

  /* Aisle colors */
  --c11: #5a3e28;
  --c22: #4a3520;
  --c21: #2a3d4a;
  --c32: #1e3530;
  --c31: #2d2d3a;
  --c42: #3a2a1a;
  --c41: #1a3228;
  --c52: #38281e;
  --c51: #1e2e38;
  --c61: #2e2420;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 18px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.logo {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
}

.header-title {
  font-size: 14px;
  font-weight: 400;
  color: #8a8a82;
}

.header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
}

.btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 8px 16px;
  border-radius: 3px;
  cursor: pointer;
  border: 1px solid var(--border-light);
  background: transparent;
  color: var(--text-muted);
  transition: all 0.15s;
}

.btn:hover {
  border-color: var(--accent-dim);
  color: var(--accent);
}

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #1a1a18;
  font-weight: 500;
}

.btn-primary:hover {
  background: #d4b87e;
  border-color: #d4b87e;
  color: #1a1a18;
}

/* LAYOUT */
.main {
  padding: 24px 20px;
  max-width: 100%;
}

/* FLOOR MAP */
.floor-map {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px 24px 16px;
  margin-bottom: 28px;
  overflow-x: auto;
}

.floor-map-title {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.floor-visual {
  display: flex;
  gap: 3px;
  align-items: flex-start;
  min-width: 700px;
}

.floor-run {
  display: flex;
  flex-direction: column;
  gap: 3px;
  cursor: pointer;
  transition: opacity 0.15s;
}

.floor-run:hover { opacity: 0.8; }

.floor-run.active .run-label {
  color: var(--accent);
  border-color: var(--accent);
}

.run-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  text-align: center;
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 3px 0;
  letter-spacing: 0.05em;
  transition: all 0.15s;
  white-space: nowrap;
  overflow: hidden;
}

.run-spaces {
  display: grid;
  grid-template-columns: repeat(24, 1fr);
  gap: 2px;
  width: 100%;
}

.mini-space {
  width: 14px;
  height: 28px;
  border-radius: 1px;
  opacity: 0.6;
  transition: opacity 0.1s;
  position: relative;
}

.mini-space.filled { opacity: 1; }
.mini-space.empty { opacity: 0.2; background: var(--border) !important; }

.floor-run.active .mini-space { opacity: 1; }

/* AISLE SECTION */
.aisle-section {
  margin-bottom: 20px;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.aisle-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}

.aisle-header:hover { background: rgba(255,255,255,0.02); }

.aisle-id-badge {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--accent);
  min-width: 36px;
}

.aisle-meta {
  flex: 1;
}

.aisle-name {
  font-size: 13px;
  font-weight: 500;
  color: #d4d0c8;
}

.aisle-zone {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #888880;
  letter-spacing: 0.08em;
  margin-top: 2px;
}

.aisle-fill-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-dim);
}

.fill-track {
  width: 80px;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.fill-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.3s;
}

.chevron {
  color: var(--text-dim);
  font-size: 12px;
  transition: transform 0.2s;
}

.aisle-section.collapsed .chevron { transform: rotate(-90deg); }
.aisle-section.collapsed .spaces-grid { display: none; }

/* COLOR STRIP */
.color-strip {
  height: 3px;
}

/* SPACES GRID */
.spaces-grid {
  padding: 0 0 16px;
}

/* COLUMN HEADERS */
.col-headers {
  display: grid;
  grid-template-columns: 44px 1fr 200px 90px;
  gap: 0;
  padding: 8px 20px 6px;
  border-bottom: 1px solid var(--border);
}

.col-hdr {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #5e5e58;
}

/* SPACE ROW */
.space-row {
  display: grid;
  grid-template-columns: 44px 1fr 200px 90px;
  gap: 0;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  align-items: stretch;
}

.space-row:last-child { border-bottom: none; }
.space-row:hover { background: rgba(255,255,255,0.015); }

.space-num {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  border-right: 1px solid var(--border);
  padding: 0 8px;
  min-height: 46px;
  background: rgba(0,0,0,0.15);
}

/* INPUT GROUPS */
.cell-sku-name {
  display: grid;
  grid-template-columns: 110px 1fr;
  border-right: 1px solid var(--border);
}

.cell-size {
  border-right: 1px solid var(--border);
  display: flex;
  align-items: stretch;
}

.cell-price {
  display: flex;
  align-items: stretch;
}

/* INPUTS */
.field {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: #ccc8be;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 400;
  padding: 8px 12px;
  border-right: 1px solid var(--border);
  transition: background 0.1s;
  height: 100%;
  min-height: 46px;
}

.field:last-child { border-right: none; }

.field::placeholder {
  color: #525250;
  font-size: 11px;
}

.field:focus {
  background: rgba(212, 180, 122, 0.06);
  color: #e0d8c8;
}

.field:focus::placeholder { opacity: 0; }

.field-sku {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.04em;
  color: #b8c4d0;
}

.field-price {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  border-right: none;
  color: #b8d0b0;
}

/* Status indicator on space num */
.space-num-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid var(--border);
  min-height: 46px;
  background: rgba(0,0,0,0.15);
}

.space-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--border);
  position: absolute;
  top: 8px;
  right: 8px;
  transition: background 0.2s;
}

.space-dot.filled { background: var(--accent); }

.sp-num {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: #888880;
}

/* PRINT */
@media print {
  body { background: white; color: black; }
  .header { display: none; }
  .floor-map { display: none; }
  .aisle-section { border-color: #ccc; break-inside: avoid; }
  .aisle-header { background: #f5f5f5; }
  .field { color: black; font-size: 11px; }
  .space-num-wrap { background: #f9f9f9; }
  .btn { display: none; }
  .aisle-section.collapsed .spaces-grid { display: block; }
}

@media (max-width: 600px) {
  .col-headers { grid-template-columns: 36px 1fr 120px 72px; }
  .space-row { grid-template-columns: 36px 1fr 120px 72px; }
  .cell-sku-name { grid-template-columns: 80px 1fr; }
  .field { font-size: 11px; padding: 6px 8px; }
  .header-title { display: none; }
}

/* SAVE NOTICE */
.save-notice {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--accent);
  color: #1a1a18;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 10px 18px;
  border-radius: 3px;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.2s;
  pointer-events: none;
}

.save-notice.show {
  opacity: 1;
  transform: translateY(0);
}

/* STATS BAR */
.stats-bar {
  display: flex;
  gap: 24px;
  padding: 12px 20px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #7a7a72;
  letter-spacing: 0.08em;
  overflow-x: auto;
}

.stat { white-space: nowrap; }
.stat strong { color: var(--accent); }

</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="logo">Floor Plan</span>
    <span class="header-title">Tile Department — 9 Runs · 216 Spaces</span>
  </div>
  <div class="header-actions">
    <button class="btn" onclick="expandAll()">Expand All</button>
    <button class="btn" onclick="collapseAll()">Collapse All</button>
    <button class="btn" onclick="clearAll()">Clear</button>
    <button class="btn btn-primary" onclick="saveData()">Save</button>
    <button class="btn" onclick="window.print()">Print</button>
  </div>
</div>

<div class="main">

  <!-- FLOOR MAP -->
  <div class="floor-map">
    <div class="floor-map-title">Department Layout — Click a run to jump to it</div>
    <div class="floor-visual" id="floorVisual"></div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat">Filled: <strong id="statFilled">0</strong></div>
    <div class="stat">Empty: <strong id="statEmpty">216</strong></div>
    <div class="stat">Total Spaces: <strong>216</strong></div>
    <div class="stat">Runs: <strong>9</strong></div>
  </div>

  <!-- AISLE SECTIONS -->
  <div id="aisleContainer"></div>

</div>

<div class="save-notice" id="saveNotice">Saved</div>

<script>
const AISLES = [
  { id: '1-1', name: 'XL Wood Look',                                    zone: 'Extra-Large Format Wood Look',                       color: '#5c3d1e' },
  { id: '2-2', name: 'Wood Look / Slate / Outdoor / Quarry / Saltillo', zone: 'Wood Look · Slate · Outdoor · Quarry · Saltillo',    color: '#4a3820' },
  { id: '2-1', name: 'Contemporary',                                     zone: 'Contemporary Floor Tile',                            color: '#2a3848' },
  { id: '3-2', name: 'Travertine / Limestone / Contemporary Overflow',   zone: 'Travertine · Limestone · Contemporary Overflow',     color: '#3d3020' },
  { id: '4-2', name: 'Marble Look',                                      zone: 'Marble Look Floor Tile',                             color: '#2a3030' },
  { id: '4-1', name: 'White Marble Look',                                zone: 'White Marble Look Floor Tile',                       color: '#2e2e3a' },
  { id: '5-2', name: 'LFT 24x48 — Category Flow A',                     zone: 'Large Format 24×48 · Follows Category Flow',         color: '#1e3035' },
  { id: '5-1', name: 'LFT 24x48 — Category Flow B',                     zone: 'Large Format 24×48 · Follows Category Flow',         color: '#1a2c32' },
  { id: '6-1', name: 'XL LFT 30x60+',                                   zone: 'Extra-Large Format 30×60 and Larger',                color: '#282030' },
];

const SPACES = 24;
const STORAGE_KEY = 'tileDeptFloorPlan_v2';

// Load saved data
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveData() {
  const data = {};
  AISLES.forEach(aisle => {
    data[aisle.id] = [];
    for (let i = 1; i <= SPACES; i++) {
      const sku = document.getElementById(`${aisle.id}_${i}_sku`)?.value || '';
      const name = document.getElementById(`${aisle.id}_${i}_name`)?.value || '';
      const size = document.getElementById(`${aisle.id}_${i}_size`)?.value || '';
      const price = document.getElementById(`${aisle.id}_${i}_price`)?.value || '';
      data[aisle.id].push({ sku, name, size, price });
    }
  });
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    const notice = document.getElementById('saveNotice');
    notice.classList.add('show');
    setTimeout(() => notice.classList.remove('show'), 1800);
  } catch(e) { alert('Save failed. Storage may be full or unavailable.'); }
}

function clearAll() {
  if (!confirm('Clear all data? This cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  document.querySelectorAll('.field').forEach(f => f.value = '');
  updateAll();
}

function expandAll() {
  document.querySelectorAll('.aisle-section').forEach(s => s.classList.remove('collapsed'));
}

function collapseAll() {
  document.querySelectorAll('.aisle-section').forEach(s => s.classList.add('collapsed'));
}

// Build floor visual
function buildFloorVisual(savedData) {
  const container = document.getElementById('floorVisual');
  container.innerHTML = '';
  AISLES.forEach(aisle => {
    const aData = savedData[aisle.id] || [];
    const run = document.createElement('div');
    run.className = 'floor-run';
    run.id = `map_${aisle.id}`;
    run.onclick = () => {
      document.getElementById(`section_${aisle.id}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    const label = document.createElement('div');
    label.className = 'run-label';
    label.textContent = aisle.id;
    label.style.minWidth = `${SPACES * 16}px`;

    const spacesEl = document.createElement('div');
    spacesEl.className = 'run-spaces';

    for (let i = 0; i < SPACES; i++) {
      const sp = document.createElement('div');
      sp.className = 'mini-space';
      sp.style.background = aisle.color;
      const entry = aData[i];
      const filled = entry && (entry.sku || entry.name);
      sp.classList.toggle('filled', !!filled);
      sp.classList.toggle('empty', !filled);
      spacesEl.appendChild(sp);
    }

    run.appendChild(label);
    run.appendChild(spacesEl);
    container.appendChild(run);
  });
}

// Update fill bar + dots + stats
function updateAll() {
  let totalFilled = 0;
  AISLES.forEach(aisle => {
    let filled = 0;
    for (let i = 1; i <= SPACES; i++) {
      const sku = document.getElementById(`${aisle.id}_${i}_sku`)?.value || '';
      const name = document.getElementById(`${aisle.id}_${i}_name`)?.value || '';
      const hasFill = sku.trim() || name.trim();
      const dot = document.getElementById(`dot_${aisle.id}_${i}`);
      if (dot) dot.classList.toggle('filled', !!hasFill);
      const miniSpace = document.querySelector(`#map_${aisle.id} .run-spaces .mini-space:nth-child(${i})`);
      if (miniSpace) {
        miniSpace.classList.toggle('filled', !!hasFill);
        miniSpace.classList.toggle('empty', !hasFill);
      }
      if (hasFill) filled++;
    }
    totalFilled += filled;
    const bar = document.getElementById(`bar_${aisle.id}`);
    const pct = document.getElementById(`pct_${aisle.id}`);
    if (bar) bar.style.width = `${(filled / SPACES) * 100}%`;
    if (pct) pct.textContent = `${filled}/${SPACES}`;
  });
  document.getElementById('statFilled').textContent = totalFilled;
  document.getElementById('statEmpty').textContent = 216 - totalFilled;
}

// Build aisle sections
function buildAisles(savedData) {
  const container = document.getElementById('aisleContainer');
  container.innerHTML = '';

  AISLES.forEach(aisle => {
    const aData = savedData[aisle.id] || [];

    const section = document.createElement('div');
    section.className = 'aisle-section';
    section.id = `section_${aisle.id}`;

    // Color strip
    const strip = document.createElement('div');
    strip.className = 'color-strip';
    strip.style.background = aisle.color;
    section.appendChild(strip);

    // Header
    const header = document.createElement('div');
    header.className = 'aisle-header';
    header.style.background = `${aisle.color}22`;
    header.innerHTML = `
      <div class="aisle-id-badge">${aisle.id}</div>
      <div class="aisle-meta">
        <div class="aisle-name">${aisle.name}</div>
        <div class="aisle-zone">${aisle.zone}</div>
      </div>
      <div class="aisle-fill-bar">
        <div class="fill-track"><div class="fill-bar" id="bar_${aisle.id}" style="width:0%"></div></div>
        <span id="pct_${aisle.id}">0/${SPACES}</span>
      </div>
      <div class="chevron">&#9660;</div>
    `;
    header.onclick = () => section.classList.toggle('collapsed');
    section.appendChild(header);

    // Grid
    const grid = document.createElement('div');
    grid.className = 'spaces-grid';

    // Column headers
    const colHdr = document.createElement('div');
    colHdr.className = 'col-headers';
    colHdr.innerHTML = `
      <div class="col-hdr" style="text-align:center">#</div>
      <div class="col-hdr" style="padding-left:12px">SKU &nbsp;·&nbsp; Product Name</div>
      <div class="col-hdr" style="padding-left:12px">Size</div>
      <div class="col-hdr" style="padding-left:12px">Price</div>
    `;
    grid.appendChild(colHdr);

    // Rows
    for (let i = 1; i <= SPACES; i++) {
      const saved = aData[i - 1] || {};

      const row = document.createElement('div');
      row.className = 'space-row';

      // Number + dot
      const numWrap = document.createElement('div');
      numWrap.className = 'space-num-wrap';
      numWrap.innerHTML = `
        <span class="sp-num">${i}</span>
        <div class="space-dot ${(saved.sku || saved.name) ? 'filled' : ''}" id="dot_${aisle.id}_${i}"></div>
      `;
      row.appendChild(numWrap);

      // SKU + Name cell
      const skuName = document.createElement('div');
      skuName.className = 'cell-sku-name';
      skuName.innerHTML = `
        <input class="field field-sku" id="${aisle.id}_${i}_sku" placeholder="SKU #" value="${escHtml(saved.sku || '')}" data-aisle="${aisle.id}" data-sp="${i}">
        <input class="field" id="${aisle.id}_${i}_name" placeholder="Product name" value="${escHtml(saved.name || '')}" data-aisle="${aisle.id}" data-sp="${i}" style="border-right:none">
      `;
      row.appendChild(skuName);

      // Size cell
      const sizeCell = document.createElement('div');
      sizeCell.className = 'cell-size';
      sizeCell.innerHTML = `<input class="field" id="${aisle.id}_${i}_size" placeholder='e.g. 12x24, 3x6' value="${escHtml(saved.size || '')}" data-aisle="${aisle.id}" data-sp="${i}" style="border-right:none">`;
      row.appendChild(sizeCell);

      // Price cell
      const priceCell = document.createElement('div');
      priceCell.className = 'cell-price';
      priceCell.innerHTML = `<input class="field field-price" id="${aisle.id}_${i}_price" placeholder="$0.00" value="${escHtml(saved.price || '')}" data-aisle="${aisle.id}" data-sp="${i}">`;
      row.appendChild(priceCell);

      grid.appendChild(row);
    }

    section.appendChild(grid);
    container.appendChild(section);
  });

  // Live update on input
  container.addEventListener('input', () => updateAll());
  // Auto-save on change
  container.addEventListener('change', () => saveData());
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// INIT
(function init() {
  const saved = loadData();
  buildFloorVisual(saved);
  buildAisles(saved);
  updateAll();
})();

// Keyboard shortcut: Ctrl+S
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveData();
  }
});
</script>
</body>
</html>
